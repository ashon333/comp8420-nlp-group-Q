<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congo Shop - Next-Gen Intelligence</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Discover our exclusive collection of AI-powered electronics and smart home devices. Congo Shop is built with semantic search and real-time review sentiment analysis.">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- JS files -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Protect route: Redirect to login.html if user is not logged in
    requireAuth();
  </script>
</head>
<body class="min-h-screen bg-[#fffcf9] font-sans pb-16">

  <!-- Shared Navbar Injected Here -->
  <div id="navbar-container"></div>

  <main class="animate-fade-in">
    <!-- Hero Section -->
    <section class="px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto mt-6">
      <div class="bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-800 rounded-[2rem] overflow-hidden flex flex-col md:flex-row shadow-2xl relative">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay pointer-events-none"></div>
        
        <div class="md:w-1/2 p-10 md:p-16 flex flex-col justify-center relative z-10">
          <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-6 leading-tight drop-shadow-sm">
            Next-Gen <br /> Intelligence
          </h1>
          <p class="text-slate-300 text-lg mb-8 max-w-md font-medium">
            Discover our exclusive collection of AI-powered electronics and smart home devices.
          </p>

          <!-- Search Form inside Hero -->
          <div class="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/20 shadow-lg mb-8 flex flex-col gap-4">
            <form id="search-form" class="flex flex-col sm:flex-row gap-3">
              <div class="relative flex-1 group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <i data-lucide="search" class="h-5 w-5 text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]"></i>
                </div>
                <input
                  type="text"
                  id="search-query"
                  placeholder="Search electronics..."
                  class="block w-full pl-12 pr-4 py-4 bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl text-white placeholder-slate-300 focus:ring-2 focus:ring-fuchsia-400 focus:border-transparent focus:outline-none transition-all shadow-inner"
                />
              </div>
              <button
                type="submit"
                id="btn-search-submit"
                class="bg-gradient-to-r from-cyan-500 to-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:scale-105 hover:shadow-[0_0_20px_rgba(34,211,238,0.5)] transition-all duration-300 disabled:opacity-70 disabled:hover:scale-100 whitespace-nowrap active:scale-95"
              >
                Search
              </button>
            </form>
          </div>
        </div>

        <div class="md:w-1/2 relative min-h-[350px] bg-[url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=800')] bg-cover bg-center">
          <div class="absolute inset-0 bg-gradient-to-r from-slate-900 to-transparent"></div>
          <div class="absolute inset-0 bg-indigo-900/20 mix-blend-multiply"></div>
        </div>
      </div>
    </section>

    <!-- Products Section -->
    <section id="products-section" class="bg-[#ffebcc] py-16 px-4 sm:px-6 lg:px-8 mt-8 rounded-t-[3rem]">
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-10">
          <h2 class="text-3xl font-bold text-slate-800" id="products-section-title">
            Best Selling Product
          </h2>

        </div>

        <!-- Loading Spinner -->
        <div id="products-loader" class="hidden text-center py-16">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mx-auto"></div>
          <p class="text-orange-800 font-medium mt-4">Searching catalog...</p>
        </div>

        <!-- Products Grid Container -->
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <!-- Dynamically injected product cards -->
        </div>

        <!-- Empty State -->
        <div id="products-empty-state" class="hidden text-center py-16 bg-white/50 backdrop-blur-sm rounded-3xl border border-orange-200">
          <p class="text-orange-800 font-medium">No products found. Try a different search.</p>
        </div>
      </div>
    </section>

    <!-- Categories Section -->
    <section class="py-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
      <h2 class="text-3xl font-extrabold text-slate-800 mb-10 text-center relative">
        Shop By Category
        <div class="absolute w-24 h-1 bg-gradient-to-r from-cyan-400 to-blue-500 bottom-[-12px] left-1/2 transform -translate-x-1/2 rounded-full"></div>
      </h2>
      <div id="categories-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- Dynamically injected categories -->
      </div>
    </section>
  </main>

  <!-- Lucide Icons & Shared Navbar scripts -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/navbar.js"></script>

  <!-- Homepage Controller Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const searchForm = document.getElementById('search-form');
      const searchQuery = document.getElementById('search-query');
      const productsTitle = document.getElementById('products-section-title');
      const productsLoader = document.getElementById('products-loader');
      const productsContainer = document.getElementById('products-container');
      const productsEmpty = document.getElementById('products-empty-state');
      const categoriesContainer = document.getElementById('categories-container');
      const searchButton = document.getElementById('btn-search-submit');

      let allProducts = [];

      // Initialize page load data
      fetchTopProducts();
      fetchCategories();

      // Form submission for Semantic Search
      searchForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const query = searchQuery.value.trim();
        
        if (!query) {
          productsTitle.textContent = 'Best Selling Product';
          fetchTopProducts();
          return;
        }

        setLoading(true);
        productsContainer.innerHTML = '';
        productsEmpty.classList.add('hidden');

        try {
          const res = await fetch(`${API_BASE}/search`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
          });
          
          if (!res.ok) throw new Error('Search failed');
          
          const data = await res.json();
          const results = data.results || [];
          
          productsTitle.textContent = 'Search Results';
          renderProducts(results);
          
          // Smooth scroll to results
          setTimeout(() => {
            document.getElementById('products-section').scrollIntoView({ behavior: 'smooth' });
          }, 100);

        } catch (err) {
          console.error(err);
          productsContainer.innerHTML = '';
          productsEmpty.classList.remove('hidden');
        } finally {
          setLoading(false);
        }
      });

      function setLoading(isLoading) {
        if (isLoading) {
          productsLoader.classList.remove('hidden');
          searchButton.disabled = true;
          searchButton.textContent = 'Searching...';
        } else {
          productsLoader.classList.add('hidden');
          searchButton.disabled = false;
          searchButton.textContent = 'Search';
        }
      }

      async function fetchTopProducts() {
        try {
          const res = await fetch(`${API_BASE}/products`);
          if (!res.ok) throw new Error('Failed to fetch products');
          const data = await res.json();
          allProducts = data.products || [];
          renderProducts(allProducts);
        } catch (e) {
          console.error(e);
          productsContainer.innerHTML = '';
          productsEmpty.classList.remove('hidden');
        }
      }

      async function fetchCategories() {
        try {
          const res = await fetch(`${API_BASE}/categories`);
          if (!res.ok) throw new Error('Failed to fetch categories');
          const data = await res.json();
          renderCategories(data.categories || []);
        } catch (e) {
          console.error(e);
        }
      }

      function renderProducts(products) {
        productsContainer.innerHTML = '';
        if (products.length === 0) {
          productsEmpty.classList.remove('hidden');
          return;
        }

        productsEmpty.classList.add('hidden');
        products.forEach(product => {
          const productCard = document.createElement('a');
          productCard.href = `product-details.html?id=${product.id}`;
          productCard.className = 'bg-white rounded-3xl p-4 shadow-sm hover:shadow-xl transition-all duration-300 group flex flex-col';
          
          // Resolve correct image property
          const imageUrl = product.image || product.image_url || 'https://via.placeholder.com/300';
          const price = typeof product.price === 'number' ? product.price : parseFloat(product.price) || 0;

          productCard.innerHTML = `
            <div class="bg-[#f8f9fa] rounded-2xl aspect-square mb-4 overflow-hidden flex items-center justify-center p-4 relative">
              <img
                src="${imageUrl}"
                alt="${product.name}"
                class="object-contain h-full w-full group-hover:scale-110 transition-transform duration-500 mix-blend-multiply"
              />
            </div>

            <div class="flex-grow flex flex-col px-2 pb-2">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">${product.category}</p>
              <h3 class="text-base font-bold text-slate-800 mb-2 line-clamp-1">${product.name}</h3>

              <div class="mt-auto flex items-center justify-between">
                <span class="text-xl font-bold text-slate-900">$${price.toFixed(2)}</span>
                <button class="bg-orange-100 text-orange-600 p-2 rounded-full hover:bg-orange-500 hover:text-white transition-colors pointer-events-none">
                  <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
              </div>
            </div>
          `;

          productsContainer.appendChild(productCard);
        });

        // Initialize Lucide icons on dynamic content
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }

      function renderCategories(categories) {
        categoriesContainer.innerHTML = '';
        categories.forEach((cat) => {
          const card = document.createElement('div');
          card.className = 'relative rounded-[2rem] overflow-hidden h-72 group cursor-pointer shadow-lg hover:shadow-2xl transition-all duration-500 bg-white';
          
          // Filter products in place on the home page when clicking category card
          card.onclick = () => {
            const filtered = allProducts.filter(p => p.category === cat.name);
            productsTitle.textContent = `${cat.name} Products`;
            renderProducts(filtered);
            
            // Smooth scroll to products section
            setTimeout(() => {
              document.getElementById('products-section').scrollIntoView({ behavior: 'smooth' });
            }, 100);
          };

          card.innerHTML = `
            <img src="${cat.image}" class="w-full h-full object-contain p-8 group-hover:scale-110 transition-transform duration-700 mix-blend-multiply" alt="${cat.name}" />
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent flex items-end justify-center pb-8">
              <span class="text-white text-2xl font-bold tracking-widest uppercase group-hover:-translate-y-2 transition-transform duration-300 text-center px-4 line-clamp-1">${cat.name}</span>
            </div>
          `;
          categoriesContainer.appendChild(card);
        });
      }
    });
  </script>
</body>
</html>
